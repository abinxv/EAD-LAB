<!DOCTYPE html>
<html>
<head>
  <title>Chessboard Pattern</title>

  <style>
    .board {
      width: 320px;
      height: 320px;
      border: 2px solid black;
      display: flex;
      flex-wrap: wrap;
    }

    .box {
      width: 40px;
      height: 40px;
    }

    .black {
      background-color: black;
    }

    .white {
      background-color: white;
    }
  </style>
</head>

<body>

  <h3>Chess Board Pattern</h3>

  <div class="board">
    <!-- Row 1 -->
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>

    <!-- Row 2 -->
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>

    <!-- Row 3 -->
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>

    <!-- Row 4 -->
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>

    <!-- Row 5 -->
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>

    <!-- Row 6 -->
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>

    <!-- Row 7 -->
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>

    <!-- Row 8 -->
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>
    <div class="box black"></div>
    <div class="box white"></div>

  </div>

</body>
</html>
